version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: public_admin_db
    environment:
      POSTGRES_DB: public_admin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - public_admin_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: public_admin_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - public_admin_network

volumes:
  postgres_data:

networks:
  public_admin_network:
    driver: bridge

