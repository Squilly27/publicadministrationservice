spring.application.name=publicadministrationservice

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration - PostgreSQL (Production)
spring.datasource.url=jdbc:postgresql://localhost:5432/public_admin
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

# Spring Data JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=your-super-secret-key-that-is-at-least-256-bits-long-for-HS512-algorithm
jwt.expiration=86400000

# File Upload
allegati.upload.dir=/var/data/public_admin/uploads

# Logging
logging.level.root=WARN
logging.level.com.ifm.publicadministrationservice=INFO

