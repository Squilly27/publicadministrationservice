spring.application.name=publicadministrationservice

# Server Configuration
server.port=8081
server.servlet.context-path=/

# Database Configuration - H2 (Development)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Spring Data JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Initialize database with SQL script
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:init-data.sql
spring.jpa.defer-datasource-initialization=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# File Upload
allegati.upload.dir=./uploads

# Logging
logging.level.root=INFO
logging.level.com.ifm.publicadministrationservice=DEBUG

